<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManiSkill-ViTac Challenge 2026 — Social Poster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #0a0a1a;
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 0;
    min-height: 100vh;
  }

  /* 4:5 portrait, social-friendly */
  .poster {
    width: 1080px;
    height: 1350px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    border-radius: 0;
    background:
      radial-gradient(ellipse 70% 50% at 85% 55%, #c026d3 0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 15% 75%, #6d28d9 0%, transparent 55%),
      radial-gradient(ellipse 40% 35% at 55% 30%, #3b82f6 0%, transparent 60%),
      linear-gradient(160deg, #1e3a8a 0%, #1e1b4b 40%, #2d1b69 70%, #0a0a2a 100%);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  /* light rays — diagonal streaks */
  .rays {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    opacity: 0.9;
  }
  .rays::before, .rays::after {
    content: '';
    position: absolute;
    top: -20%; left: -20%;
    width: 140%; height: 140%;
    background: repeating-linear-gradient(
      68deg, transparent 0px, transparent 38px,
      rgba(255,255,255,0.04) 38px, rgba(255,255,255,0.08) 42px,
      transparent 46px, transparent 90px);
    mix-blend-mode: screen;
  }
  .rays::after {
    background: repeating-linear-gradient(
      62deg, transparent 0px, transparent 90px,
      rgba(186,230,253,0.06) 92px, rgba(216,180,254,0.10) 98px,
      transparent 104px, transparent 180px);
    opacity: 0.8;
  }

  /* glowing center streak */
  .beam {
    position: absolute;
    top: 0; left: 50%;
    width: 900px; height: 100%;
    transform: translateX(-50%) rotate(62deg);
    background: radial-gradient(ellipse 40% 80% at 50% 50%,
      rgba(186,230,253,0.25) 0%, rgba(167,139,250,0.15) 30%, transparent 70%);
    filter: blur(8px);
    pointer-events: none;
  }

  .sparkles { position: absolute; inset: 0; pointer-events: none; }
  .sparkles span {
    position: absolute; width: 3px; height: 3px;
    background: #fff; border-radius: 50%;
    box-shadow: 0 0 6px 1px rgba(255,255,255,0.8);
    opacity: 0.7;
  }

  /* content grid */
  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 60px 70px;
  }

  /* header row */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .cvpr-logo {
    height: 110px;
    width: auto;
    background: #fff;
    padding: 12px 20px;
    border-radius: 14px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-text {
    font-size: 32px; font-weight: 800;
    line-height: 1.15; text-align: right;
  }
  .brand-text small {
    display: block; font-size: 15px; color: #c4b5fd;
    font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; margin-top: 6px;
  }
  .brand-mark {
    width: 46px; height: 46px;
    border-radius: 12px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(96,165,250,0.4);
  }
  .brand-mark svg { width: 26px; height: 26px; }

  /* hero — left-aligned, just below the logo */
  .hero {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    text-align: left;
    margin-top: 28px;
  }
  .eyebrow {
    font-size: 14px; letter-spacing: 0.35em;
    color: #c4b5fd; text-transform: uppercase;
    font-weight: 700; margin-bottom: 18px;
  }
  .title-main {
    font-size: 96px; font-weight: 900; line-height: 0.95;
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #ffffff 0%, #c4b5fd 70%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .title-sub {
    font-size: 50px; font-weight: 800; line-height: 1;
    letter-spacing: 0.02em;
    background: linear-gradient(90deg, #a78bfa, #60a5fa 50%, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 22px;
  }
  .title-cn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 72px; font-weight: 900;
    letter-spacing: 0.05em; color: #fff;
    text-shadow: 0 0 30px rgba(167,139,250,0.6), 0 0 60px rgba(124,58,237,0.4);
  }

  /* description — centered & enlarged in the middle */
  .desc {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 32px; line-height: 1.75;
    color: #f1f5f9;
    text-align: center;
    font-weight: 500;
    padding: 30px 20px;
  }
  .desc p { max-width: 880px; }
  .desc .accent { color: #fde68a; font-weight: 700; }
  .desc .soft { color: #c4b5fd; font-weight: 700; }

  /* WeChat QR — bottom-right, black border cropped */
  .wechat {
    position: absolute;
    right: 60px;
    bottom: 50px;
    z-index: 3;
    width: 160px; height: 160px;
    overflow: hidden;
    border-radius: 8px;
  }
  .wechat img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    transform: scale(1.22);
    display: block;
  }
</style>
</head>
<body>
  <div class="poster">
    <div class="rays"></div>
    <div class="beam"></div>
    <div class="sparkles">
      <span style="top:12%; left:22%"></span>
      <span style="top:18%; left:78%; width:2px; height:2px"></span>
      <span style="top:32%; left:12%; width:4px; height:4px"></span>
      <span style="top:44%; left:88%"></span>
      <span style="top:62%; left:8%; width:2px; height:2px"></span>
      <span style="top:72%; left:72%; width:4px; height:4px"></span>
      <span style="top:84%; left:30%"></span>
      <span style="top:26%; left:55%; width:2px; height:2px"></span>
      <span style="top:50%; left:40%; width:2px; height:2px"></span>
    </div>

    <div class="content">
      <div class="top">
        <img src="CVPR-2026.png" alt="CVPR 2026 Denver" class="cvpr-logo">

        <div class="brand-text">
          ManiSkill-ViTac
          <small>Challenge 2026</small>
        </div>
      </div>

      <div class="hero">
        <div class="eyebrow">Vision · Tactile · Bimanual Manipulation</div>
        <div class="title-main">CHALLENGE</div>
        <div class="title-sub">2026</div>
        <div class="title-cn">正式开放</div>
      </div>

      <div class="desc">
        <p>
          由 <span class="accent">清华大学</span>、<span class="accent">中国科学院自动化所</span>
          联合 <span class="soft">CVPR 2026 Embodied AI Workshop</span> 发起，
          面向全球团队征集 <span class="soft">具备视触觉融合的操作策略</span>。
          赛事聚焦视觉、触觉与语言理解在统一框架下的深度融合，
          推动视触觉融合、多模态学习与具身智能系统研究的发展。
        </p>
      </div>
    </div>

  </div>
</body>
</html>
